name: CI

on:
  pull_request:
    branches: [main]

jobs:
  too-many-cooks-mcp:
    name: Too Many Cooks MCP Server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: too-many-cooks/package-lock.json

      - name: Install MCP server dependencies
        working-directory: too-many-cooks
        run: npm ci

      - name: Build MCP server
        working-directory: too-many-cooks
        run: npm run build

      - name: Lint MCP server
        working-directory: too-many-cooks
        run: npm run lint

      - name: Test MCP server
        working-directory: too-many-cooks
        run: npm test

  vscode-extension:
    name: VSCode Extension Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: too_many_cooks_vscode_extension/package-lock.json

      - name: Build MCP server
        working-directory: too-many-cooks
        run: |
          npm ci
          npm run build

      - name: Install extension dependencies
        working-directory: too_many_cooks_vscode_extension
        run: npm ci

      - name: Compile extension and tests
        working-directory: too_many_cooks_vscode_extension
        run: npm run pretest

      - name: Run VSCode extension tests
        uses: coactions/setup-xvfb@v1
        with:
          run: npm test
          working-directory: too_many_cooks_vscode_extension
